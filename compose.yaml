services:
  tailstate:
    build: .
    image: ${TAILSTATE_IMAGE:-ghcr.io/crypt0rr/tailstate:latest}
    restart: unless-stopped
    read_only: true
    env_file:
      - .env
    ports:
      - "${TAILSTATE_BIND_ADDRESS:-127.0.0.1}:${TAILSTATE_PORT:-8080}:8080"
    volumes:
      - ${TAILSTATE_CONFIG_FILE:-./config.yaml}:/config/tailstate.yaml:ro
      - ./tailstate-data:/data
    secrets:
      - tailscale_oauth_secret
      - tailscale_webhook_secret
      - telegram_bot_token
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true

secrets:
  tailscale_oauth_secret:
    file: ${TAILSCALE_OAUTH_SECRET_FILE:-./secrets/tailscale_oauth_secret}
  tailscale_webhook_secret:
    file: ${TAILSCALE_WEBHOOK_SECRET_FILE:-./secrets/tailscale_webhook_secret}
  telegram_bot_token:
    file: ${TELEGRAM_BOT_TOKEN_FILE:-./secrets/telegram_bot_token}
