server:
  listen: 0.0.0.0:8080
  replay_window_seconds: 300

tailscale:
  tailnet: ${TAILSCALE_TAILNET}
  base_url: https://api.tailscale.com/api/v2
  polling_enabled: true
  webhook_enabled: true
  webhook_secret_file: /run/secrets/tailscale_webhook_secret
  auth:
    type: oauth
    client_id: ${TAILSCALE_OAUTH_CLIENT_ID}
    client_secret_file: /run/secrets/tailscale_oauth_secret
    scope: all:read
  core_interval_seconds: 60
  secondary_interval_seconds: 300
  # Optional overrides are grouped into independent schedules.
  collector_intervals_seconds:
    keys: 3600
  request_timeout_seconds: 20
  startup_jitter_seconds: 10
  collectors:
    - devices
    - users
    - dns
    - policy
    - keys
    - webhooks
    - log_streaming
    - contacts
    - posture
    - settings
  stale_device:
    enabled: false
    threshold_seconds: 900
    recovery_seconds: 120

storage:
  path: /data/tailstate.db
  retention_days: 30

delivery:
  retry_horizon_seconds: 86400
  poll_interval_seconds: 2
  max_attempts: 16

destinations:
  - name: operations-telegram
    kind: telegram
    token_file: /run/secrets/telegram_bot_token
    chat_id: "${TELEGRAM_CHAT_ID}"
    include: ["tailscale.*", "tailstate.*"]
    exclude: ["tailscale.webhook.test"]
    min_severity: info

  - name: mattermost
    kind: mattermost
    url: ${MATTERMOST_WEBHOOK_URL}
    include: ["tailscale.*"]
    min_severity: warning

  # The same `url` configuration works with kind: slack, discord,
  # microsoft_teams, or google_chat.
  - name: automation
    kind: generic_webhook
    url: https://example.net/hooks/tailstate
    bearer_token_file: /run/secrets/generic_bearer_token
    hmac_secret_file: /run/secrets/generic_hmac_secret
    headers:
      X-Environment: production
    include: ["*"]
    exclude: []
    min_severity: info
